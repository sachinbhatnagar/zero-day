<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="loginbox">
    <h1>Login</h1>
    <form>
      <p>Email:</p>
      <input type="text" name="email">
      <p>Password:</p>
      <input type="password" name="password">
      <br><br>
      <input type="submit" value="Login">
    </form>
    <br>
    <hr>
    <br>
    <p>Or login with Google:</p>
    <a href="#" class="googlebtn">Google Login</a>
  </div>
</body>
</html>
